services:
  - type: web
    name: battery-crm-highflow
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: node backend/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: highflow-battery-crm-secret-2024
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: battery-crm-db
          property: connectionString
